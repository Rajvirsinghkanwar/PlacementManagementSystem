<!DOCTYPE html>
<html>
<head>
    <title>Create Profile</title>
</head>
<body>

<h2>Create Your Profile</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="branch" placeholder="Branch" required><br><br>
    <input type="number" step="0.01" name="cgpa" placeholder="CGPA" required><br><br>
    <textarea name="skills" placeholder="Skills" required></textarea><br><br>
    <input type="number" name="backlog" placeholder="Backlogs" required><br><br>

    <button type="submit">Save Profile</button>
</form>

</body>
</html>
